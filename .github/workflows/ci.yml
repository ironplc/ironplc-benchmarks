name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ironplc-bench:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-harness:
    name: Build benchmark harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            benchmarks/rusty_harness/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('benchmarks/rusty_harness/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build rusty-harness
        working-directory: benchmarks/rusty_harness
        run: cargo build --release

      - name: Run cargo clippy
        working-directory: benchmarks/rusty_harness
        run: cargo clippy -- -D warnings

  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .
